<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Upgrade v6.0</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', Courier, monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal-box { width: 100%; max-width: 600px; background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 15px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); box-sizing: border-box; }
        #output { white-space: pre-wrap; color: #7ee787; min-height: 250px; line-height: 1.5; margin-bottom: 15px; font-size: 15px; }
        #input-area { display: flex; width: 100%; align-items: center; }
        #cmd-input { background: transparent; border: none; color: #f0f6fc; font-family: inherit; font-size: 16px; flex-grow: 1; outline: none; padding: 0; }
        .prompt { color: #f78166; margin-right: 10px; font-weight: bold; }
        .btn { background-color: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 16px; margin-bottom: 20px; font-weight: bold; }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <h2>[SYSTEM] Server Uptime: 60 Years</h2>
    <button class="btn" id="start-btn" onclick="inditas()">PROGRAM INDÍTÁSA</button>

    <div class="terminal-box">
        <div id="output">Kattints a fenti gombra az inicializáláshoz...</div>
        <div id="input-area" style="display:none;">
            <span class="prompt">&gt;</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off">
        </div>
    </div>

<script>
const outputDiv = document.getElementById("output");
const inputArea = document.getElementById("input-area");
const cmdInput = document.getElementById("cmd-input");
const startBtn = document.getElementById("start-btn");

let jatekSzakasz = "binaris"; 

// Gyönyörű gépelés effekt, mint a Pythonban volt
function gepel(szoveg, callback) {
    let i = 0;
    function lep() {
        if (i < szoveg.length) {
            outputDiv.innerHTML += szoveg.charAt(i);
            i++;
            setTimeout(lep, 25);
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            outputDiv.innerHTML += "\n";
            if (callback) callback();
        }
    }
    lep();
}

function inditas() {
    startBtn.style.display = "none";
    outputDiv.innerHTML = "";
    
    gepel("============================================================\n>>> RENDSZERINDÍTÁS: Tanar_Verzio_6.0.sys ...\n============================================================\n\n[RENDSZERÜZENET]: Kritikus hiba! A rendszer korfüggő ellenőrzést kér.\n\nÍrd be a korodat BINÁRISAN (6 biten) a belépéshez: ", function() {
        inputArea.style.display = "flex";
        cmdInput.focus();
    });
}

cmdInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        let bemenet = cmdInput.value.trim();
        outputDiv.innerHTML += bemenet + "\n";
        cmdInput.value = "";
        inputArea.style.display = "none";

        if (jatekSzakasz === "binaris") {
            if (bemenet === "111100") {
                jatekSzakasz = "menu";
                gepel("\n[OK] Kód elfogadva. Tízes számrendszerben ez pontosan: 60.\nSikeres frissítés! Ön hivatalosan is Senior Fejlesztő lett.\n\n----------------------------------------\n>>> FŐMENÜ: Válassz hétvégi üzemmódot:\n----------------------------------------\n[1] Horgászat (C:\\tópart\\pecázás.exe)\n[2] Bringázás & Túra (C:\\erdő\\hegynek_fel.bat)\n\nMelyik programot indítsuk el? (1 vagy 2): ", function() {
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            } else {
                gepel("\n[HIBA] Helytelen kód! `SyntaxError: Túl fiatal vagy túl öreg.`\n\nÍrd be a korodat BINÁRISAN (6 biten) a belépéshez: ", function() {
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            }
        } else if (jatekSzakasz === "menu") {
            jatekSzakasz = "vege";
            if (bemenet === "1") {
                gepel("\n[BETÖLTÉS] Pecabot élesítve... Csali kiválasztása...\n\nSikerült fognod egy óriási pontyot!\nA hal oldalára a következő kód van pikkelyezve:\n\n    print('Boldog 60. Születésnapot!')", befejezes);
            } else if (bemenet === "2") {
                gepel("\n[BETÖLTÉS] Kerékpár guminyomás ellenőrzése... GPS koordináták betöltve...\n\nFelértél a hegytetőre! A tesi tanár éned büszke.\nA csúcskőbe vésve egy üzenetet találsz:\n\n    while élet < végtelen:\n        print('Boldog 60. Születésnapot!')", befejezes);
            } else {
                gepel("\n[HACKER DETECTED] Nem létező parancs. De mivel szülinapod van, elnézzük.\n\n    Annak ellenére, hogy nem tudsz gépelni: BOLDOG 60. SZÜLETÉSNAPOT!", befejezes);
            }
        }
    }
});

function befejezes() {
    gepel("\n============================================================\n>>> PROGRAM VÉGE. Köszönjük, hogy 60 éve dekorálod a világot! <<<\n============================================================");
}
</script>
</body>
</html>
