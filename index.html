<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Upgrade v6.0</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', Courier, monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        /* Mátrix háttér canvas */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        h2 { z-index: 1; text-shadow: 0 0 10px rgba(88, 166, 255, 0.5); text-align: center; }
        .terminal-box { width: 100%; max-width: 650px; background-color: rgba(22, 27, 34, 0.92); border: 1px solid #30363d; border-radius: 6px; padding: 15px; box-shadow: 0px 4px 20px rgba(0,0,0,0.8); box-sizing: border-box; z-index: 1; }
        #output { white-space: pre-wrap; color: #7ee787; min-height: 280px; line-height: 1.5; margin-bottom: 15px; font-size: 15px; text-shadow: 0 0 3px rgba(126, 231, 135, 0.3); }
        #input-area { display: flex; width: 100%; align-items: center; }
        #cmd-input { background: transparent; border: none; color: #f0f6fc; font-family: inherit; font-size: 16px; flex-grow: 1; outline: none; padding: 0; }
        .prompt { color: #f78166; margin-right: 10px; font-weight: bold; }
        .btn { background-color: #238636; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 16px; margin-bottom: 20px; font-weight: bold; z-index: 1; box-shadow: 0 0 10px rgba(35, 134, 54, 0.4); }
        .btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <h2>[SYSTEM] Server Uptime: 60 Years</h2>
    <button class="btn" id="start-btn" onclick="inditas()">PROGRAM INDÍTÁSA</button>

    <div class="terminal-box">
        <div id="output">Kattints a fenti gombra az inicializáláshoz...</div>
        <div id="input-area" style="display:none;">
            <span class="prompt">&gt;</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off">
        </div>
    </div>

<script>
const outputDiv = document.getElementById("output");
const inputArea = document.getElementById("input-area");
const cmdInput = document.getElementById("cmd-input");
const startBtn = document.getElementById("start-btn");

let jatekSzakasz = "binaris"; 

// --- Mátrix Eső Effekt ---
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const katakana = '01010101010101111100';
const alphabet = katakana.split('');
const fontSize = 16;
const columns = canvas.width / fontSize;
const rainDrops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = 'rgba(13, 17, 23, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet[Math.floor(Math.random() * alphabet.length)];
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() * 0.975 > 0.95) {
            rainDrops[i] = 0;
        }
        rainDrops[i]++;
    }
}
setInterval(drawMatrix, 30);

// --- Szöveggépelő motor ---
function gepel(szoveg, callback) {
    let i = 0;
    function lep() {
        if (i < szoveg.length) {
            outputDiv.innerHTML += szoveg.charAt(i);
            i++;
            setTimeout(lep, 15);
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            outputDiv.innerHTML += "\n";
            if (callback) callback();
        }
    }
    lep();
}

function inditas() {
    startBtn.style.display = "none";
    outputDiv.innerHTML = "";
    
    gepel("============================================================\n>>> RENDSZERINDÍTÁS: Tanar_Verzio_6.0.sys ...\n============================================================\n\n[RENDSZERÜZENET]: A rendszer kor-ellenőrzést kér.\n\nÍrd be a korodat BINÁRISAN (6 biten) a belépéshez: ", function() {
        inputArea.style.display = "flex";
        cmdInput.focus();
    });
}

cmdInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        let bemenet = cmdInput.value.trim();
        outputDiv.innerHTML += bemenet + "\n";
        cmdInput.value = "";
        inputArea.style.display = "none";

        if (jatekSzakasz === "binaris") {
            if (bemenet === "111100") {
                jatekSzakasz = "erdelyseg_varas";
                
                let erdelysegek = "\n[OK] Kód elfogadva. Tízes számrendszerben ez pontosan: 60.\nSikeres frissítés! Ön hivatalosan is Senior Fejlesztő lett.\n\n" +
                                  ">>> RENDSZER-INFORMÁCIÓ: Érdekességek a 60-as számról:\n" +
                                  "- A periódusos rendszer 60. eleme a neodímium.\n" +
                                  "- A legkisebb szám, amely osztható 1-től 6-ig minden számmal.\n" +
                                  "- A legelső olyan szám, amelynek pontosan 12 osztója van.\n" +
                                  "- Féltökéletes szám, egy tökéletes szám többszöröse.\n" +
                                  "- Alakja a különböző számrendszerekben:\n" +
                                  "  * Kettes (Bináris): 111100\n" +
                                  "  * Nyolcas (Oktális): 74\n" +
                                  "  * Tizenhatos (Hexadecimális): 3C\n\n" +
                                  "Nyomj ENTER-t a Főmenü betöltéséhez... ";
                                  
                gepel(erdelysegek, function() {
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            } else {
                gepel("\n[HIBA] Helytelen kód! `SyntaxError: Túl fiatal vagy túl öreg.`\n\nÍrd be a korodat BINÁRISAN (6 biten) a belépéshez: ", function() {
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            }
        } else if (jatekSzakasz === "erdelyseg_varas") {
            jatekSzakasz = "menu";
            fomenuMegjelenites();
        } else if (jatekSzakasz === "menu") {
            if (bemenet === "1") {
                gepel("\n[BETÖLTÉS] Pecabot élesítve... Csali kiválasztása...\n\nSikerült fognod egy óriási pontyot!\nA hal oldalára a következő van írva:\n\n    print('Boldog 60. Születésnapot!')\n\nNyomj ENTER-t a visszatéréshez...", function() {
                    jatekSzakasz = "visszateres_varas";
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            } else if (bemenet === "2") {
                gepel("\n[BETÖLTÉS] Kerékpár Guminyomás ellenőrizve... GPS koordináták betöltve...\n\nFelértél a hegytetőre! A tüdőd tele oxigénnel, az erdő csendes.\nA csúcskőbe vésve egy üzenetet találsz:\n\n    if kor == 60:\n        print('Boldog születésnapot!')\n\nNyomj ENTER-t a visszatéréshez...", function() {
                    jatekSzakasz = "visszateres_varas";
                    inputArea.style.display = "flex";
                    cmdInput.focus();
                });
            } else if (bemenet === "3") {
                befejezes();
            } else {
                gepel("\n[HIBA] Ismeretlen opció. Próbáld újra!", function() {
                    fomenuMegjelenites();
                });
            }
        } else if (jatekSzakasz === "visszateres_varas") {
            jatekSzakasz = "menu";
            fomenuMegjelenites();
        }
    }
});

function fomenuMegjelenites() {
    gepel("\n----------------------------------------\n>>> FŐMENÜ: Válassz hétvégi üzemmódot:\n----------------------------------------\n[1] Horgászat (C:\\tópart\\pecázás.exe)\n[2] Bringázás & Túra (C:\\erdő\\hegynek_fel.bat)\n[3] Kilépés (Rendszer leállítása)\n\nMelyik programot indítsuk el? (1, 2 vagy 3): ", function() {
        inputArea.style.display = "flex";
        cmdInput.focus();
    });
}

function befejezes() {
    outputDiv.innerHTML += "\n";
    gepel("=================================================================================\n>>> PROGRAM VÉGE. Sikeresen lefutott 60 év. Köszönjük a jelenléted a rendszerben! <<<\n=================================================================================");
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
